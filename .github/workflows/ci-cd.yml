name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Pytest
        run: |
          pip install -r app/requirements.txt pytest httpx
          python -m pytest test_main.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Hugging Face Hub
        run: pip install huggingface_hub
      - name: Deploy to Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ใช้ python -m เพื่อเรียกใช้ cli โดยตรง แก้ปัญหา command not found
          python -m huggingface_hub.commands.user login --token $HF_TOKEN
          # สั่งอัปโหลดโดยระบุโฟลเดอร์ปัจจุบัน (.) ไปยังปลายทาง (.)
          python -m huggingface_hub.commands.huggingface_cli upload netsai/model_optimization . . --repo-type=space --exclude=".git*"