name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Run Pytest
        run: |
          pip install -r app/requirements.txt pytest httpx
          python -m pytest test_main.py -v

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install HF Hub
        run: pip install huggingface_hub
      - name: Deploy to Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # ใช้ Python Script สั้นๆ ในการอัปโหลด (วิธีนี้ชัวร์กว่า Git push และรองรับไฟล์ใหญ่)
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_folder(
              folder_path='.',
              repo_id='netsai/model_optimization',
              repo_type='space',
              token='${{ env.HF_TOKEN }}'
          )
          "